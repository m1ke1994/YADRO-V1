services:
  postgres:
    env_file: !override
      - .env

  backend:
    env_file: !override
      - .env
    environment:
      DJANGO_ENV: production
      DJANGO_ENV_FILE: .env
      DJANGO_SERVE_MEDIA_FILES: "0"
      REDIS_URL: ${REDIS_URL}
    ports: !reset []
    restart: unless-stopped

  frontend:
    env_file: !override
      - vue-admin/.env
    ports: !reset []
    volumes:
      - frontend_dist:/app-dist
    command: ["sh", "-c", "npm run build && cp -a dist/. /app-dist/ && tail -f /dev/null"]
    healthcheck:
      test: ["CMD-SHELL", "test -f /app-dist/index.html"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/templates:/etc/nginx/templates:ro
      - ./docker/nginx/templates/proxy_params:/etc/nginx/proxy_params:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - frontend_dist:/var/www/frontend:ro
      - static_data:/var/www/static:ro
      - media_data:/var/www/media:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q --header=\"Host: $${DOMAIN}\" -O /dev/null http://nginx/api/health/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - yadro_network

volumes:
  frontend_dist:
